<style>
/* ── App shell ── */
html,body,#root { height:100%; margin:0; overflow:hidden; }
body { background:var(--bg-0); }
#root { max-width:430px; margin:0 auto; position:relative; height:100vh; overflow:hidden; }
.top-safe { height:env(safe-area-inset-top,10px); flex-shrink:0; }

/* ── 毛玻璃 token ── */
:root {
  --glass-light:  rgba(255,255,255,0.58);
  --glass-mid:    rgba(255,255,255,0.42);
  --glass-dark:   rgba(16,16,20,0.78);
  --glass-blur:   blur(32px) saturate(200%);
  --glass-blur-sm:blur(20px) saturate(160%);
  --glass-border-light: 0.5px solid rgba(255,255,255,0.85);
  --glass-border-dark:  0.5px solid rgba(255,255,255,0.12);
  --glass-inset:  inset 0 1px 0 rgba(255,255,255,0.88);
  --glass-inset-dark: inset 0 1px 0 rgba(255,255,255,0.14);
}

/* ── 通用毛玻璃类 ── */
.glass-light {
  background: var(--glass-light);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: var(--glass-border-light);
  box-shadow: var(--glass-inset), 0 4px 20px rgba(0,0,0,0.06);
}
.glass-dark {
  background: var(--glass-dark);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: var(--glass-border-dark);
  box-shadow: var(--glass-inset-dark), 0 12px 36px rgba(0,0,0,0.28);
  color: #fff;
}

/* ── 输入框毛玻璃 ── */
input, textarea, .field-input {
  background: rgba(255,255,255,0.60) !important;
  backdrop-filter: var(--glass-blur-sm) !important;
  -webkit-backdrop-filter: var(--glass-blur-sm) !important;
  border: var(--glass-border-light) !important;
  box-shadow: var(--glass-inset) !important;
}
input:focus, textarea:focus {
  background: rgba(255,255,255,0.78) !important;
  border-color: rgba(200,255,58,0.6) !important;
  box-shadow: var(--glass-inset), 0 0 0 3px rgba(200,255,58,0.18) !important;
}

/* ── 底部弹出面板 ── */
.edit-sheet {
  position:absolute; left:0; right:0; bottom:0; z-index:80;
  background: rgba(245,244,241,0.82);
  backdrop-filter: blur(50px) saturate(220%);
  -webkit-backdrop-filter: blur(50px) saturate(220%);
  border-radius:32px 32px 0 0;
  border-top: var(--glass-border-light);
  box-shadow: 0 -12px 48px rgba(0,0,0,0.16), var(--glass-inset);
  padding:16px 20px 40px;
  transform:translateY(0);
  transition:transform .35s cubic-bezier(.2,.85,.3,1);
}
.edit-sheet.hidden { transform:translateY(100%); }
.edit-sheet .handle {
  width:38px; height:4px; border-radius:999px;
  background:rgba(0,0,0,0.15); margin:0 auto 18px;
}

/* ── 按钮 ── */
.btn-glass {
  background: var(--glass-light);
  backdrop-filter: var(--glass-blur-sm);
  -webkit-backdrop-filter: var(--glass-blur-sm);
  border: var(--glass-border-light);
  box-shadow: var(--glass-inset);
}
.btn-glass-dark {
  background: rgba(10,10,14,0.88);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: var(--glass-border-dark);
  box-shadow: var(--glass-inset-dark);
  color:#fff;
}

/* ── 快捷 chip ── */
.chip {
  background: rgba(255,255,255,0.60);
  backdrop-filter: var(--glass-blur-sm);
  -webkit-backdrop-filter: var(--glass-blur-sm);
  border: var(--glass-border-light);
  box-shadow: var(--glass-inset), 0 2px 8px rgba(0,0,0,0.04);
  border-radius: 999px;
  padding: 7px 13px;
  font-size: 12px; font-weight: 600; color: #3a3a38;
  cursor: pointer; white-space: nowrap;
}

/* ── 动画 ── */
@keyframes mb-bounce {
  0%,80%,100% { transform:translateY(0); opacity:0.4; }
  40% { transform:translateY(-3px); opacity:1; }
}
@keyframes fade-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.fade-in { animation:fade-in .3s ease both; }
@keyframes fab-glow-pulse {
  0%,100% { opacity:0.55; transform:translateX(-50%) scale(1); }
  50% { opacity:1; transform:translateX(-50%) scale(1.3); }
}
@keyframes fab-text-bounce {
  0%,100% { transform:translateY(0); }
  45% { transform:translateY(-4px); }
  65% { transform:translateY(-2px); }
}

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── helpers ─────────────────────────────────────────────────── */
function inkOn(hex) {
  const m=/^#?([a-f0-9]{6})$/i.exec(hex);
  if(!m)return'#0a0a0a';
  const n=parseInt(m[1],16);
  const r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  const lin=c=>{c/=255;return c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4);};
  const L=0.2126*lin(r)+0.7152*lin(g)+0.0722*lin(b);
  return L>0.55?'#0a0a0a':'#ffffff';
}
async function apiPost(path, body) {
  const r = await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||'请求失败');}
  return r.json();
}
function getLS(key,def=null){try{return JSON.parse(localStorage.getItem(key))||def;}catch{return def;}}
function setLS(key,val){localStorage.setItem(key,JSON.stringify(val));}

/* ─── DonutChart ──────────────────────────────────────────────── */

/* ─── 3D 旋转饼图 ────────────────────────────────────────────── */
function SolidPieChart({ spent, total, accent }) {
  const remaining = Math.max(0, total - spent);
  const overBudget = total > 0 && spent > total;
  const usedPct   = total > 0 ? Math.min(1, spent / total) : 0;
  const remainPct = 1 - usedPct;

  // ── Animation ──────────────────────────────────────────────────
  const angleRef = useRef(0);
  const [angle,  setAngle]  = useState(0);
  const rafRef   = useRef(null);
  const t0Ref    = useRef(null);
  useEffect(()=>{
    function frame(ts){
      if(!t0Ref.current) t0Ref.current = ts;
      angleRef.current = ((ts - t0Ref.current) * 0.022) % 360; // ~28s/rev
      setAngle(angleRef.current);
      rafRef.current = requestAnimationFrame(frame);
    }
    rafRef.current = requestAnimationFrame(frame);
    return ()=>{ cancelAnimationFrame(rafRef.current); };
  },[]);

  // ── SVG pie math ───────────────────────────────────────────────
  const CX=70, CY=70, R=66;
  const pt = pct => {
    const a = -Math.PI/2 + pct*2*Math.PI;
    return [CX+R*Math.cos(a), CY+R*Math.sin(a)];
  };
  const arcPath = (f,t)=>{
    const s=t-f;
    if(s<=0.0001) return null;
    if(s>=0.9999) return `M ${CX} ${CY-R} A ${R} ${R} 0 1 1 ${CX-0.01} ${CY-R} Z`;
    const [x1,y1]=pt(f),[x2,y2]=pt(t);
    return `M ${CX} ${CY} L ${x1} ${y1} A ${R} ${R} 0 ${s>0.5?1:0} 1 ${x2} ${y2} Z`;
  };
  const [s1x,s1y]=pt(usedPct), [s2x,s2y]=pt(0);

  // Dynamic shadow offset follows the rotation
  const shadowX = Math.round(Math.sin(angle*Math.PI/180)*12);
  const shadowY = Math.round(Math.cos(angle*Math.PI/180)*4 + 8);

  return (
    <div style={{
      margin:'0 18px 16px',
      background:'rgba(255,255,255,0.58)',
      backdropFilter:'blur(32px) saturate(200%)',
      WebkitBackdropFilter:'blur(32px) saturate(200%)',
      borderRadius:28, padding:'14px 16px 16px',
      border:'0.5px solid rgba(255,255,255,0.85)',
      boxShadow:'inset 0 1px 0 rgba(255,255,255,0.9),0 4px 20px rgba(0,0,0,0.06)',
    }}>

      {/* 标题 */}
      <div style={{marginBottom:12}}>
        <span style={{fontSize:13,fontWeight:800,color:'#0a0a0a',letterSpacing:'-0.01em'}}>本月余额</span>
      </div>

      <div style={{display:'flex',alignItems:'center',gap:14}}>

        {/* ── 3D 旋转饼图 ── */}
        <div style={{
          flexShrink:0, width:112, height:112,
          perspective:'480px',
          perspectiveOrigin:'50% 40%',
        }}>
          <div style={{
            width:112, height:112,
            transform:`rotateX(52deg) rotateZ(${angle}deg)`,
            transformStyle:'preserve-3d',
            transformOrigin:'50% 50%',
            willChange:'transform',
          }}>
            {/* ── 厚度层（3D 侧面）── */}
            {[12,9,6,3].map(z=>(
              <div key={z} style={{
                position:'absolute',inset:0,
                transform:`translateZ(-${z}px)`,
                pointerEvents:'none',
              }}>
                <svg width="112" height="112" viewBox="0 0 140 140">
                  {arcPath(0,usedPct)   && <path d={arcPath(0,usedPct)}   fill={`rgba(6,6,10,${0.7+z*0.025})`}/>}
                  {arcPath(usedPct,1)   && <path d={arcPath(usedPct,1)}   fill={`rgba(160,210,35,${0.55+z*0.02})`}/>}
                </svg>
              </div>
            ))}

            {/* ── 正面 ── */}
            <div style={{position:'absolute',inset:0}}>
              <svg width="112" height="112" viewBox="0 0 140 140">
                <defs>
                  <filter id="glw3d" x="-35%" y="-35%" width="170%" height="170%">
                    <feGaussianBlur stdDeviation="5" result="b"/>
                    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                  </filter>
                  <radialGradient id="shine3d" cx="30%" cy="28%" r="55%">
                    <stop offset="0%"   stopColor="rgba(255,255,255,0.35)"/>
                    <stop offset="100%" stopColor="rgba(255,255,255,0)"/>
                  </radialGradient>
                </defs>
                {/* 深色扇形 */}
                {arcPath(0,usedPct) && <path d={arcPath(0,usedPct)} fill="#0d0d11"/>}
                {/* lime 扇形 + 辉光 */}
                {arcPath(usedPct,1) && <>
                  <path d={arcPath(usedPct,1)} fill={accent} filter="url(#glw3d)"/>
                  <path d={arcPath(usedPct,1)} fill="url(#shine3d)"/>
                </>}
                {/* 白色分割线 */}
                {usedPct>0.005&&usedPct<0.995&&<>
                  <line x1={CX} y1={CY} x2={s1x} y2={s1y} stroke="rgba(255,255,255,0.85)" strokeWidth="1.8" strokeLinecap="round"/>
                  <line x1={CX} y1={CY} x2={s2x} y2={s2y} stroke="rgba(255,255,255,0.85)" strokeWidth="1.8" strokeLinecap="round"/>
                </>}
              </svg>
            </div>
          </div>
        </div>

        {/* ── 右侧数据 ── */}
        <div style={{flex:1}}>
          {[
            {dot:accent,    glow:true,  label:'剩余', val:remaining, pct:Math.round(remainPct*100)},
            {dot:'#0d0d11', glow:false, label:'已花', val:spent,     pct:Math.round(usedPct*100)},
          ].map(r=>(
            <div key={r.label} style={{marginBottom:14}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                <div style={{
                  width:7,height:7,borderRadius:2,
                  background:r.dot,flexShrink:0,
                  boxShadow:r.glow?`0 0 8px ${r.dot}aa`:'none',
                }}/>
                <span style={{fontSize:10.5,color:'#9a9a96',fontWeight:600,letterSpacing:'0.02em'}}>{r.label}</span>
              </div>
              <div style={{display:'flex',alignItems:'baseline',gap:4,paddingLeft:13}}>
                <span className="num" style={{
                  fontSize:20,fontWeight:900,letterSpacing:'-0.04em',
                  color:overBudget&&r.label==='剩余'?'#e53935':'#0a0a0a',
                }}>
                  ¥{r.val.toLocaleString('zh-CN')}
                </span>
                <span style={{fontSize:10.5,color:'#c0c0bc',fontWeight:700}}>{r.pct}%</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── InteractiveChart（周/月/年切换 + hover tooltip）────────── */
function InteractiveChart({ accent, budget }) {
  const [period,    setPeriod]   = useState('week');
  const [chartInfo, setChartInfo] = useState(null);
  const [tooltip,   setTooltip]  = useState(null); // {idx, x, y}
  const svgRef = useRef(null);

  useEffect(()=>{
    fetch(`/api/chart-data?period=${period}`)
      .then(r=>r.json()).then(setChartInfo).catch(()=>{});
  },[period]);

  const data      = chartInfo?.chartData || [];
  const predicted = chartInfo?.predictedCount || 0;
  const subtitle  = chartInfo?.subtitle || '';
  const bgt       = chartInfo?.budget ?? budget ?? 84;

  // ── SVG math ──────────────────────────────────────────────────
  const W=320, H=120, PAD={t:16,r:12,b:22,l:12};
  const plotW=W-PAD.l-PAD.r, plotH=H-PAD.t-PAD.b;
  const amounts = data.map(d=>d.amount);
  const minV    = amounts.length ? Math.max(0, Math.min(...amounts)*0.6) : 0;
  const maxV    = amounts.length ? Math.max(...amounts)*1.25 : 100;
  const toX = i  => PAD.l + (i/(Math.max(data.length-1,1)))*plotW;
  const toY = v  => PAD.t + plotH - ((v-minV)/(maxV-minV||1))*plotH;
  const pts  = data.map((d,i)=>({x:toX(i),y:toY(d.amount),...d}));

  function smooth(arr) {
    if(arr.length<2) return '';
    let p=`M ${arr[0].x} ${arr[0].y}`;
    for(let i=0;i<arr.length-1;i++){
      const p0=arr[Math.max(0,i-1)],p1=arr[i],p2=arr[i+1],p3=arr[Math.min(arr.length-1,i+2)];
      const c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
      const c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
      p+=` C ${c1x},${c1y} ${c2x},${c2y} ${p2.x},${p2.y}`;
    }
    return p;
  }

  const splitAt   = data.length - predicted;
  const actualPts = pts.slice(0,splitAt);
  const predPts   = pts.slice(splitAt-1);
  const actualD   = smooth(actualPts);
  const predD     = smooth(predPts);
  const baseline  = PAD.t+plotH+1;
  const fillD     = actualPts.length>=2
    ? `${actualD} L ${actualPts.at(-1).x},${baseline} L ${actualPts[0].x},${baseline} Z` : '';

  const budgetY = toY(bgt);
  const fillId  = 'cf';

  // ── Interaction ───────────────────────────────────────────────
  function getIdx(clientX) {
    if(!svgRef.current||!data.length) return null;
    const rect = svgRef.current.getBoundingClientRect();
    const frac  = (clientX - rect.left) / rect.width;
    const idx   = Math.round(frac * (data.length-1));
    return Math.max(0, Math.min(data.length-1, idx));
  }
  function onMove(e) {
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const idx = getIdx(cx);
    if(idx===null) return;
    const p = pts[idx];
    if(p) setTooltip({idx, x:p.x, y:p.y, d:data[idx]});
  }
  function onLeave() { setTooltip(null); }

  const hov = tooltip ? pts[tooltip.idx] : null;

  return (
    <div style={{
      margin:'0 18px 14px',
      background:'rgba(255,255,255,0.58)',
      backdropFilter:'blur(32px) saturate(200%)',WebkitBackdropFilter:'blur(32px) saturate(200%)',
      borderRadius:28,padding:'12px 12px 6px',
      border:'0.5px solid rgba(255,255,255,0.85)',
      boxShadow:'inset 0 1px 0 rgba(255,255,255,0.9),0 4px 20px rgba(0,0,0,0.06)',
    }}>
      {/* header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0 4px 2px'}}>
        <div style={{display:'flex',gap:8,alignItems:'baseline'}}>
          <span style={{fontSize:12,fontWeight:800,color:'#0a0a0a'}}>消费趋势</span>
          <span style={{fontSize:10,color:'#9a9a96',fontWeight:600}}>{subtitle}</span>
        </div>
        {/* period tabs */}
        <div style={{display:'flex',gap:2,background:'rgba(0,0,0,0.05)',borderRadius:999,padding:2}}>
          {['week','month','year'].map((p,i)=>{
            const lbl=['周','月','年'][i];
            const on=period===p;
            return(
              <button key={p} onClick={()=>setPeriod(p)} style={{
                fontSize:10,fontWeight:700,padding:'3px 9px',borderRadius:999,border:0,cursor:'pointer',
                background:on?'#0a0a0a':'transparent',
                color:on?'#fff':'#9a9a96',
                transition:'all .2s',
              }}>{lbl}</button>
            );
          })}
        </div>
      </div>

      {/* SVG chart */}
      <div style={{position:'relative',userSelect:'none'}}>
        <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} width="100%" preserveAspectRatio="none"
          style={{display:'block',touchAction:'none',cursor:'crosshair'}}
          onMouseMove={onMove} onMouseLeave={onLeave}
          onTouchMove={e=>{e.preventDefault();onMove(e);}} onTouchEnd={onLeave}>
          <defs>
            <linearGradient id={fillId} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#0a0a0a" stopOpacity="0.10"/>
              <stop offset="100%" stopColor="#0a0a0a" stopOpacity="0"/>
            </linearGradient>
          </defs>

          {/* budget line */}
          <line x1={PAD.l} y1={budgetY} x2={W-PAD.r} y2={budgetY}
            stroke="#c8c8c4" strokeWidth="1" strokeDasharray="4 5"/>
          <text x={W-PAD.r-3} y={budgetY-6} textAnchor="end"
            fontSize="8" fill="#b0b0ac" fontWeight="700">预算 ¥{bgt}</text>

          {/* area fill */}
          {fillD&&<path d={fillD} fill={`url(#${fillId})`}/>}

          {/* actual line */}
          {actualD&&<path d={actualD} fill="none" stroke="#0a0a0a" strokeWidth="2.8"
            strokeLinecap="round" strokeLinejoin="round"/>}

          {/* predicted dashed */}
          {predPts.length>=2&&<path d={predD} fill="none" stroke="#c8c8c4"
            strokeWidth="2" strokeDasharray="5 4" strokeLinecap="round"/>}

          {/* hover highlight line */}
          {hov&&<line x1={hov.x} y1={PAD.t} x2={hov.x} y2={PAD.t+plotH}
            stroke="rgba(0,0,0,0.08)" strokeWidth="1"/>}

          {/* hover dot */}
          {hov&&<>
            <circle cx={hov.x} cy={hov.y} r={14} fill={accent} opacity="0.25"/>
            <circle cx={hov.x} cy={hov.y} r={6}  fill={accent}/>
            <circle cx={hov.x} cy={hov.y} r={6}  fill="none" stroke="#0a0a0a" strokeWidth="2"/>
          </>}

          {/* x-axis labels */}
          {data.map((d,i)=>(
            <text key={i} x={toX(i)} y={H-6} textAnchor="middle"
              fontSize="8" fontWeight="600"
              fill={i>=splitAt?'#c8c8c4':i===tooltip?.idx?'#0a0a0a':'#9a9a96'}>
              {d.label}
            </text>
          ))}
        </svg>

        {/* TOOLTIP */}
        {tooltip&&hov&&(()=>{
          const d   = data[tooltip.idx];
          const svgW = svgRef.current?.getBoundingClientRect().width || 320;
          const pctX = hov.x / W;                   // 0..1
          const tipW = 110;
          let left    = pctX * svgW - tipW/2;
          left = Math.max(8, Math.min(svgW - tipW - 8, left));
          const pctY = (hov.y - PAD.t) / plotH;     // 0..1
          const top  = pctY < 0.45 ? hov.y/(H)*100+8+'%' : undefined;
          const bot  = pctY >= 0.45 ? (1 - hov.y/H)*100+8+'%' : undefined;
          return(
            <div style={{
              position:'absolute',left,top,bottom:bot,
              width:tipW,zIndex:10,
              background:'rgba(10,10,14,0.88)',
              backdropFilter:'blur(20px) saturate(180%)',WebkitBackdropFilter:'blur(20px) saturate(180%)',
              border:'0.5px solid rgba(255,255,255,0.14)',
              borderRadius:14,padding:'9px 12px',
              boxShadow:'inset 0 1px 0 rgba(255,255,255,0.10),0 8px 24px rgba(0,0,0,0.30)',
              pointerEvents:'none',
            }}>
              <div style={{fontSize:10,color:'rgba(255,255,255,0.5)',fontWeight:600,marginBottom:2}}>{d.date||d.label}</div>
              <div className="num" style={{fontSize:16,fontWeight:900,color:'#fff',letterSpacing:'-0.04em'}}>¥{d.amount}</div>
              {d.overBudget&&<div style={{fontSize:9.5,color:accent,fontWeight:700,marginTop:2}}>超支 ¥{d.amount-(bgt||0)}</div>}

          ))}

        {/* BUDGET FORECAST CHART */}
        <div style={{padding:'16px 22px 6px',display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
          <h2 style={{fontSize:13,fontWeight:800,margin:0}}>月底预测</h2>
          <span style={{fontSize:10,color:'#9a9a96',fontWeight:600}}>按当前节奏推算</span>
        </div>
        <div style={{margin:'0 18px 4px',background:'rgba(255,255,255,0.60)',backdropFilter:'blur(28px) saturate(180%)',WebkitBackdropFilter:'blur(28px) saturate(180%)',borderRadius:18,padding:'14px 14px 8px',overflow:'hidden'}}>
          {finGuide?.chartPoints?.length?(
            (()=>{
              const pts=finGuide.chartPoints;
              const W=320,H=120,PL=4,PR=52,PT=12,PB=20;
              const plotW=W-PL-PR,plotH=H-PT-PB;
              const maxV=Math.max(...pts.map(p=>p.remaining),1);
              const toX=i=>PL+i/(pts.length-1)*plotW;
              const toY=v=>PT+plotH-(v/maxV)*plotH;
              const baseY=toY(0);
              function sp(arr){
                if(arr.length<2)return '';
                let d=`M${arr[0].x.toFixed(1)},${arr[0].y.toFixed(1)}`;
                for(let i=1;i<arr.length;i++){
                  const p0=arr[Math.max(0,i-2)],p1=arr[i-1],p2=arr[i],p3=arr[Math.min(arr.length-1,i+1)];
                  const c1x=p1.x+(p2.x-p0.x)/6,c1y=p1.y+(p2.y-p0.y)/6;
                  const c2x=p2.x-(p3.x-p1.x)/6,c2y=p2.y-(p3.y-p1.y)/6;
                  d+=` C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
                }
                return d;
              }
              const mapped=pts.map((p,i)=>({...p,x:toX(i),y:toY(p.remaining)}));
              const splitIdx=mapped.findIndex(p=>p.isProjected);
              const actualPts=splitIdx>0?mapped.slice(0,splitIdx+1):mapped;
              const projPts=splitIdx>0?mapped.slice(splitIdx):[];
              const fullLine=sp(mapped);
              const areaD=`${fullLine} L${mapped[mapped.length-1].x.toFixed(1)},${baseY} L${mapped[0].x.toFixed(1)},${baseY} Z`;
              const last=mapped[mapped.length-1];
              const todayPt=splitIdx>0?mapped[splitIdx-1]:null;
              return(
                <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block'}}>
                  <defs>
                    <linearGradient id="bgFill" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="#9ab832" stopOpacity="0.40"/>
                      <stop offset="100%" stopColor="#9ab832" stopOpacity="0.04"/>
                    </linearGradient>
                  </defs>

          const [editText,setEditText]=React.useState('');
          const [editLoading,setEditLoading]=React.useState(false);
          const [calData,setCalData]=React.useState(null);
          const [calLoaded,setCalLoaded]=React.useState(false);

          // 加载本月数据
          React.useEffect(()=>{
            fetch('/api/chart-data?period=month').then(r=>r.json()).then(d=>{
              setCalData(d); setCalLoaded(true);
            }).catch(()=>setCalLoaded(true));
          },[]);

          const todayISO=new Date().toISOString().slice(0,10);
          const now=new Date();
          const year=now.getFullYear();
          const month=now.getMonth(); // 0-indexed
          const monthStr=`${year}/${String(month+1).padStart(2,'0')}`;

          // 本月所有天 → Map date→record
          const recordMap={};
          (calData?.chartData||[]).forEach(r=>{if(r.date)recordMap[r.date]=r;});

          // 计算月统计
          const monthRecords=Object.values(recordMap);
          const mTotal=monthRecords.reduce((s,r)=>s+(r.amount||0),0);
          const mAvg=monthRecords.length?Math.round(mTotal/monthRecords.length):0;
          const mOver=monthRecords.filter(r=>r.overBudget||(budget>0&&r.amount>budget)).length;

          // 构建日历格子（日一二三四五六）
          const firstDay=new Date(year,month,1).getDay(); // 0=Sun
          const daysInMonth=new Date(year,month+1,0).getDate();
          const cells=[];
          for(let i=0;i<firstDay;i++) cells.push(null);
          for(let d=1;d<=daysInMonth;d++) cells.push(d);
          // 补齐到整行
          while(cells.length%7!==0) cells.push(null);

          async function saveEdit(){
            if(!editText.trim()||!editDay)return;
            setEditLoading(true);
            try{
              const r=await apiPost('/api/spending/update',{date:editDay.date,text:editText,dailyBudget:budget});
              // 更新本地 calData
              setCalData(prev=>{
                const arr=(prev?.chartData||[]).filter(x=>x.date!==editDay.date);
                const d2=new Date(editDay.date+'T00:00:00');
                arr.push({date:editDay.date,amount:r.total,overBudget:r.overBudget,
                  label:editDay.date===todayISO?'今天':`${d2.getMonth()+1}/${d2.getDate()}`});
                arr.sort((a,b)=>a.date.localeCompare(b.date));
                return {...prev,chartData:arr};
              });
              setEditDay(null); setEditText('');
            }catch(e){alert(e.message);}
            setEditLoading(false);
          }

          const WEEK_LABELS=['日','一','二','三','四','五','六'];

          return(
          <div style={{padding:'0 18px'}}>
            {/* 标题行 */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,paddingTop:16}}>
              <span style={{fontSize:13,fontWeight:800}}>消费日历</span>
              <span style={{fontSize:10,color:'#9a9a96',fontWeight:600}}>{monthStr} · 点日期可编辑</span>
            </div>

            {/* 月统计 */}
            {monthRecords.length>0&&(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:10}}>
              {[
                {l:'本月总支出',v:`¥${mTotal}`},
                {l:'日均消费',  v:`¥${mAvg}`},
                {l:'超预算天数',v:`${mOver}天`},
              ].map(s=>(
                <div key={s.l} style={{background:'rgba(255,255,255,0.62)',backdropFilter:'blur(28px)',WebkitBackdropFilter:'blur(28px)',borderRadius:14,padding:'10px 8px',textAlign:'center',border:'0.5px solid rgba(0,0,0,0.04)'}}>
                  <div className="num" style={{fontSize:15,fontWeight:900,color:'#0a0a0a'}}>{s.v}</div>
                  <div style={{fontSize:9,color:'#9a9a96',marginTop:2,fontWeight:600}}>{s.l}</div>
                </div>
              ))}
            </div>
            )}

            {/* 日历网格 */}
            <div style={{background:'rgba(255,255,255,0.62)',backdropFilter:'blur(28px)',WebkitBackdropFilter:'blur(28px)',borderRadius:18,padding:'12px 10px',border:'0.5px solid rgba(0,0,0,0.04)'}}>
              {/* 星期头 */}
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:6}}>
                {WEEK_LABELS.map(l=>(
                  <div key={l} style={{textAlign:'center',fontSize:10,fontWeight:700,color:'#9a9a96',padding:'2px 0'}}>{l}</div>
                ))}
              </div>
              {/* 日期格子 */}
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
                {cells.map((day,i)=>{
                  if(!day) return <div key={'e'+i}/>;
                  const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                  const rec=recordMap[dateStr];
                  const isFuture=dateStr>todayISO;
                  const isToday=dateStr===todayISO;
                  const over=rec&&(rec.overBudget||(budget>0&&rec.amount>budget));
                  const hasData=!!rec;

                  let bg='transparent',dayColor='#9a9a96',amtColor='transparent',border='none';
                  if(isFuture){dayColor='#d0d0cc';}
                  else if(hasData&&over){
                    bg=accent; dayColor=accentInk; amtColor=accentInk; border='none';
                  } else if(hasData&&!over){
                    bg='#0a0a0a'; dayColor='#fff'; amtColor='rgba(255,255,255,0.7)'; border='none';
                  } else if(isToday){
                    border=`1.5px solid ${accent}`; dayColor='#0a0a0a';
                  } else {
                    dayColor='#6a6a68';
                  }

                  return(
                    <div key={dateStr} onClick={()=>{
                      if(isFuture)return;
                      setEditDay({date:dateStr,existing:rec?.items?.join('，')||''});
                      setEditText(rec?.items?.join('，')||'');
                    }} style={{
                      borderRadius:8,padding:'5px 2px 4px',textAlign:'center',cursor:isFuture?'default':'pointer',
                      background:bg,border,boxSizing:'border-box',
                      minHeight:44,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                    }}>
                      <div style={{fontSize:12,fontWeight:800,color:dayColor,lineHeight:1}}>{day}</div>
                      {hasData&&(
                        <div style={{fontSize:9,fontWeight:700,color:amtColor,marginTop:2,lineHeight:1}}>
                          ¥{rec.amount}
                        </div>
                      )}
                      {!hasData&&isToday&&(
                        <div style={{fontSize:8,color:accent,marginTop:2,fontWeight:700}}>今</div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* 图例 */}
            <div style={{display:'flex',gap:12,marginTop:8,justifyContent:'flex-end'}}>
              {[{c:'#0a0a0a',l:'未超支'},{c:accent,l:'超支'},{c:'rgba(0,0,0,0.12)',l:'无记录'}].map(x=>(
                <div key={x.l} style={{display:'flex',alignItems:'center',gap:4}}>
                  <span style={{width:8,height:8,borderRadius:2,background:x.c,flexShrink:0,border:x.c==='rgba(0,0,0,0.12)'?'0.5px solid rgba(0,0,0,0.12)':'none'}}/>
                  <span style={{fontSize:9.5,color:'#9a9a96',fontWeight:600}}>{x.l}</span>
                </div>
              ))}
            </div>

            {/* 编辑弹层 */}
            {editDay&&(
            <>
              <div onClick={()=>{setEditDay(null);setEditText('');}} style={{
                position:'fixed',inset:0,zIndex:90,background:'rgba(10,10,12,0.25)',
                backdropFilter:'blur(2px)',WebkitBackdropFilter:'blur(2px)',
              }}/>
              <div style={{
                position:'fixed',bottom:0,left:0,right:0,zIndex:91,
                background:'rgba(255,255,255,0.96)',backdropFilter:'blur(40px)',WebkitBackdropFilter:'blur(40px)',
                borderRadius:'24px 24px 0 0',padding:'16px 20px 100px',
                boxShadow:'0 -8px 40px rgba(0,0,0,0.14)',
                border:'0.5px solid rgba(255,255,255,0.9)',
              }}>
                <div style={{width:38,height:4,borderRadius:999,background:'rgba(0,0,0,0.15)',margin:'0 auto 14px'}}/>
                <div style={{fontSize:14,fontWeight:800,marginBottom:2}}>
                  {editDay.date===todayISO?'今天':editDay.date} 的消费
                </div>
                <div style={{fontSize:11.5,color:'#9a9a96',marginBottom:10}}>
                  {editDay.existing?'已有记录，修改后覆盖保存':'还没有记录，现在补上'}
                </div>
                <textarea value={editText} onChange={e=>setEditText(e.target.value)}
                  placeholder="食堂15，奶茶20，地铁4…"
                  style={{width:'100%',minHeight:72,padding:'10px 12px',borderRadius:12,
                    border:'0.5px solid rgba(0,0,0,0.10)',background:'rgba(0,0,0,0.04)',
                    font:'inherit',fontSize:13.5,outline:'none',resize:'none',
                    boxSizing:'border-box',lineHeight:1.6,color:'#0a0a0a'}}/>
                <button onClick={saveEdit} disabled={editLoading||!editText.trim()} style={{
                  width:'100%',marginTop:10,padding:'14px',border:0,borderRadius:16,
                  background:editLoading||!editText.trim()?'#c8c8c4':'#0a0a0a',
                  color:'#fff',font:'inherit',fontSize:14,fontWeight:800,cursor:'pointer',
                  boxShadow:'0 4px 16px rgba(0,0,0,0.18)',
                }}>{editLoading?'保存中…':'保存'}</button>
              </div>
            </>
            )}
          </div>
          );
        })()}


        <div style={{height:96}}/>
      </div>
      <BottomNav active="review" onNav={onNav} style={navStyle} accent={accent} chatOpen={chatOpen}/>

      {/* INPUT SHEET */}
      {(()=>{
        const [qCat,setQCat]=React.useState('餐饮');
        const QCATS={
          '餐饮':[
            {n:'食堂',p:15},{n:'外卖',p:30},{n:'奶茶',p:20},{n:'咖啡',p:18},{n:'快餐',p:22},
            {n:'零食',p:12},{n:'水果',p:10},{n:'牛奶',p:8},{n:'面包',p:8},{n:'饮料',p:6},
            {n:'火锅',p:80},{n:'烧烤',p:60},{n:'聚餐',p:50},{n:'夜宵',p:30},{n:'早餐',p:10},
          ],
          '交通':[
            {n:'地铁',p:4},{n:'公交',p:2},{n:'打车',p:22},{n:'共享单车',p:2},
            {n:'高铁',p:80},{n:'出租',p:20},
          ],
          '生活':[
            {n:'超市',p:30},{n:'日用品',p:20},{n:'洗衣',p:8},{n:'理发',p:35},
            {n:'快递',p:5},{n:'话费',p:30},{n:'水电费',p:50},{n:'网费',p:20},
            {n:'药',p:20},{n:'医院',p:50},{n:'洗漱用品',p:30},{n:'卫生纸',p:15},
          ],
          '学习':[
            {n:'打印',p:5},{n:'文具',p:10},{n:'教材',p:40},{n:'课程费',p:100},
            {n:'考试费',p:50},{n:'网课',p:200},{n:'实验材料',p:30},
          ],
          '娱乐':[
            {n:'电影',p:35},{n:'游戏充值',p:30},{n:'KTV',p:80},{n:'演出票',p:150},
            {n:'美甲',p:80},{n:'健身',p:30},{n:'会员订阅',p:20},{n:'密室',p:100},
          ],
        };
        function addItem(n,p){
          setText(t=>{
            const comma=t.trim()&&!t.trim().endsWith('，')?'，':'';
            return t.trim()+comma+n+p;
          });
        }
        return(
        <>
          <div onClick={()=>{setInputOpen(false);setErr('');}} style={{
            position:'absolute',inset:0,zIndex:70,
            background:'rgba(10,10,12,0.20)',
            backdropFilter:'blur(2px)',WebkitBackdropFilter:'blur(2px)',
            opacity:inputOpen?1:0,pointerEvents:inputOpen?'auto':'none',transition:'opacity .2s',
          }}/>
          <div className={`edit-sheet${inputOpen?'':' hidden'}`} style={{zIndex:80,paddingBottom:20}}>
            <div className="handle"/>
            <div style={{fontSize:15,fontWeight:800,marginBottom:2,color:'#0a0a0a'}}>记录今日消费</div>
            <div style={{fontSize:12,color:'#9a9a96',marginBottom:10}}>点击下方快速添加，或直接输入</div>

            {/* 分类 tab */}
            <div style={{display:'flex',gap:6,marginBottom:8,overflowX:'auto',paddingBottom:2}}>
              {Object.keys(QCATS).map(cat=>(
                <button key={cat} onClick={()=>setQCat(cat)} style={{
                  flexShrink:0,fontSize:11.5,fontWeight:700,padding:'5px 12px',borderRadius:999,
                  border:qCat===cat?'none':'0.5px solid rgba(0,0,0,0.08)',cursor:'pointer',
                  background:qCat===cat?'#0a0a0a':'rgba(255,255,255,0.65)',
                  color:qCat===cat?'#fff':'#6a6a68',
                  backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',
                }}>{cat}</button>
              ))}
            </div>

            {/* 快捷条目 */}
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
              {(QCATS[qCat]||[]).map(item=>(
                <button key={item.n} onClick={()=>addItem(item.n,item.p)} style={{
                  fontSize:12,fontWeight:600,padding:'5px 10px',borderRadius:999,
                  border:'0.5px solid rgba(0,0,0,0.08)',cursor:'pointer',
                  background:'rgba(255,255,255,0.72)',backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',
                  color:'#3a3a38',display:'flex',alignItems:'center',gap:4,
                }}>
                  {item.n}
                  <span style={{fontSize:10,color:'#9a9a96',fontWeight:500}}>¥{item.p}</span>
                </button>
              ))}
            </div>

            {/* 文字输入 */}
            <textarea value={text} onChange={e=>setText(e.target.value)}
              placeholder={'例：食堂15，奶茶20，地铁4，洗衣8…'}
              style={{width:'100%',minHeight:72,padding:'10px 12px',borderRadius:14,border:'0.5px solid rgba(0,0,0,0.10)',
                background:'rgba(0,0,0,0.04)',font:'inherit',fontSize:13.5,color:'#0a0a0a',outline:'none',resize:'none',
                boxSizing:'border-box',lineHeight:1.6}}/>
            <div style={{fontSize:10.5,color:'#b0b0ac',marginTop:4,marginBottom:8}}>可直接修改金额，格式：物品+金额，逗号分隔</div>

            {err&&<div style={{padding:'10px 12px',background:'#fff0f0',borderRadius:12,fontSize:12,color:'#c01900',fontWeight:600,marginBottom:10}}>⚠ {err}</div>}
            <button onClick={submit} disabled={loading||!text.trim()} style={{
              width:'100%',padding:'14px',border:0,borderRadius:18,
              background:loading||!text.trim()?'#c8c8c4':'#0a0a0a',color:'#fff',
              font:'inherit',fontSize:15,fontWeight:800,cursor:'pointer',
              boxShadow:'0 6px 20px rgba(0,0,0,0.22)',
            }}>{loading?'分析中…':'开始复盘'}</button>
          </div>
        </>
        );
      })()}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   RISK SCREEN  — 原版视觉 + 真实 API
   ════════════════════════════════════════════════════════════════ */
function RiskScreen({onNav,accent,accentInk,navStyle,chatOpen}){
  const [question,setQuestion]=useState('');
  const [sheetOpen,setSheetOpen]=useState(false);
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');

  async function submit(q){
    const qq=q||question;
    if(!qq.trim())return;
    setErr('');setLoading(true);
    try{
      const data=await apiPost('/api/risk-education',{question:qq});
      setResult(data);setSheetOpen(false);
    }catch(e){setErr(e.message);}
    setLoading(false);
  }

  const riskLevel=result?.riskScore!=null?result.riskScore-1:4;
  const levels=['低','中低','中','高','极高'];
  const displayQ=result?.question||'我能不能拿生活费买虚拟货币？';

  return(
    <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',position:'relative',overflow:'hidden'}}>
      <div className="wallpaper"/>
      <div className="app-scroll" style={{flex:1,overflowY:'auto',overflowX:'hidden',paddingTop:24,position:'relative',zIndex:1}}>
        <BackBar title="理财风险" onBack={()=>onNav('home')}/>
        <div style={{padding:'0 22px 4px'}}>
          <div style={{fontSize:11,color:'#9a9a96',fontWeight:700,letterSpacing:'0.12em'}}>NOT FINANCIAL ADVICE</div>
          <h1 className="num" style={{margin:'4px 0 8px',fontSize:30,fontWeight:800,letterSpacing:'-0.03em',lineHeight:1.15}}>
            不推销，<br/>只帮你看懂风险
          </h1>
        </div>

        {/* QUESTION CHIP */}
        <div onClick={()=>setSheetOpen(true)} style={{
          margin:'14px 18px 0',
          background:'rgba(20,20,24,0.82)',backdropFilter:'blur(36px) saturate(200%)',WebkitBackdropFilter:'blur(36px) saturate(200%)',
          border:'0.5px solid rgba(255,255,255,0.10)',
          boxShadow:'inset 0 1px 0 rgba(255,255,255,0.16),0 8px 22px rgba(0,0,0,0.20)',
          borderRadius:22,padding:'14px 16px',color:'#fff',cursor:'pointer',
        }}>
          <div style={{fontSize:10,color:'rgba(255,255,255,0.5)',fontWeight:800,letterSpacing:'0.16em'}}>你问</div>
          <div style={{fontSize:15,fontWeight:700,marginTop:4}}>{displayQ}</div>
        </div>

        {/* RISK GAUGE */}
        <div style={{
          margin:'14px 18px 16px',borderRadius:28,padding:'22px 22px 18px',
          background:'rgba(255,255,255,0.60)',backdropFilter:'blur(28px) saturate(180%)',
          WebkitBackdropFilter:'blur(28px) saturate(180%)',
          boxShadow:'inset 0 1px 0 rgba(255,255,255,0.8),0 4px 18px rgba(0,0,0,0.05)',
          border:'0.5px solid rgba(0,0,0,0.04)',
        }}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
            <div style={{fontSize:10,fontWeight:800,color:'#9a9a96',letterSpacing:'0.16em'}}>风险等级</div>
            <span style={{background:accent,color:accentInk,fontSize:11,fontWeight:800,padding:'4px 9px',borderRadius:999}}>
              {result?.studentSuitability||'学生不适合'}
            </span>
          </div>
          <div style={{display:'flex',alignItems:'flex-end',gap:8,marginTop:6}}>
            <span className="num" style={{fontSize:64,fontWeight:900,lineHeight:0.85,color:'#0a0a0a'}}>{result?.riskLevel||'极高'}</span>
            <span style={{fontSize:13,color:'#9a9a96',fontWeight:600,marginBottom:8}}>{(riskLevel+1)} / 5 级</span>
          </div>
          <div style={{marginTop:18,display:'flex',gap:4}}>
            {levels.map((_,i)=>{
              const tones=['#dededa','#b8b8b3','#7c7c78','#3e3e3c',accent];
              return <div key={i} style={{flex:1,height:8,borderRadius:999,background:i<=riskLevel?tones[i]:'#f3f3f1'}}/>;
            })}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:8}}>
            {levels.map((l,i)=>(
              <span key={l} style={{fontSize:10,fontWeight:700,color:i===riskLevel?'#0a0a0a':'#c8c8c4'}}>{l}</span>
            ))}
          </div>
        </div>

        {/* AI EXPLANATION */}
        <div style={{margin:'0 18px 16px',display:'flex',gap:10,alignItems:'flex-start'}}>
          <Buddy size={28} accent={accent}/>
          <div style={{
            background:'rgba(255,255,255,0.60)',backdropFilter:'blur(28px) saturate(180%)',WebkitBackdropFilter:'blur(28px) saturate(180%)',borderRadius:'4px 18px 18px 18px',
            padding:'14px 16px',fontSize:13.5,lineHeight:1.6,color:'#0a0a0a',flex:1,
          }}>
            {result?.reply||<>直接说结论：<b>不能。</b>不是道德判断，是数学问题 ——
              <ul style={{margin:'8px 0 0',paddingLeft:18,fontSize:13,color:'#3a3a38'}}>
                <li style={{marginBottom:4}}>日内 30~50% 波动属于常态</li>
                <li style={{marginBottom:4}}>生活费 = 不可承受损失的钱</li>
                <li>你需要的是「亏完不影响下个月吃饭」的余钱</li>
              </ul>
            </>}
          </div>
        </div>

        {/* REASON CARDS */}
        <div style={{padding:'0 22px',fontSize:15,fontWeight:800,marginBottom:10}}>该问之前先想</div>
        <div style={{padding:'0 18px 12px',display:'flex',flexDirection:'column',gap:8}}>
          {(result?.reasons||[
            {t:'损失上限',d:'极端情况会归零，能接受这笔钱完全消失吗？'},
            {t:'应急备份',d:'生活费是用来吃饭住宿的，没有冗余金'},
            {t:'资产配置',d:'高风险资产应 ≤ 总余钱的 5%，不是 100%'},
          ]).map((r,n)=>(
            <div key={n} style={{
              background:'rgba(255,255,255,0.60)',backdropFilter:'blur(28px) saturate(180%)',
              WebkitBackdropFilter:'blur(28px) saturate(180%)',borderRadius:20,padding:'14px 16px',
              boxShadow:'inset 0 1px 0 rgba(255,255,255,0.8),0 4px 18px rgba(0,0,0,0.05)',
              border:'0.5px solid rgba(0,0,0,0.04)',display:'flex',alignItems:'flex-start',gap:14,
            }}>
              <span className="num" style={{fontSize:24,fontWeight:900,color:'#c8c8c4',width:26,flexShrink:0}}>0{n+1}</span>
              <div>
                {typeof r==='string'
                  ? <div style={{fontSize:13,color:'#3a3a38',lineHeight:1.5}}>{r}</div>
                  : <><div style={{fontSize:13.5,fontWeight:800}}>{r.t}</div><div style={{fontSize:12,color:'#9a9a96',marginTop:3}}>{r.d}</div></>
                }
              </div>
            </div>
          ))}
        </div>

        {/* SUGGESTION */}
        <div style={{
          margin:'8px 18px 16px',padding:'14px 16px',background:accent,backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',borderRadius:22,color:accentInk,border:'0.5px solid rgba(255,255,255,0.20)',boxShadow:'inset 0 1px 0 rgba(255,255,255,0.22),0 8px 22px rgba(0,0,0,0.35)',
          display:'flex',alignItems:'center',gap:12,

/* ─── 财务健康分计算 ─────────────────────────────────────────── */
function calcHealthScore(plan, review) {
  let score = 0;
  const reasons = { good: [], improve: [] };
  // 预算清晰度 (30分)
  if (plan?.dailyBudget) { score += 30; reasons.good.push('已设置每日预算'); }
  else reasons.improve.push('尚未设置预算');
  // 储蓄目标合理性 (20分)
  if (plan?.savingGoal && plan?.monthlyIncome) {
    const ratio = plan.savingGoal / plan.monthlyIncome;
    if (ratio > 0 && ratio <= 0.4) { score += 20; reasons.good.push('储蓄目标比例合理'); }
    else if (ratio > 0.4) { score += 8; reasons.improve.push('储蓄目标占比偏高，生活空间紧张'); }
    else reasons.improve.push('建议设置攒钱目标');
  } else if (plan?.savingGoal) { score += 10; reasons.good.push('已设置攒钱目标'); }
  else reasons.improve.push('建议设置攒钱目标');
  // 复盘连续性 (25分)
  if (review?.date) {
    const d = new Date(review.date);
    const diff = (Date.now() - d.getTime()) / 86400000;
    if (diff <= 1) { score += 25; reasons.good.push('今天已复盘'); }
    else if (diff <= 3) { score += 15; reasons.good.push('最近有复盘记录'); }
    else { score += 5; reasons.improve.push('复盘频率有点低，建议每天记一次'); }
  } else reasons.improve.push('还没有复盘记录');
  // 应急金意识 (15分) — 估算（有余额意识）
  if (plan?.monthlyIncome && plan?.fixedExpense) { score += 15; reasons.good.push('已记录固定支出'); }
  else reasons.improve.push('应急金意识还不强');
  // 消费结构 (10分) — 如果最近复盘超支次数少
  if (review && !review.overBudget) { score += 10; reasons.good.push('最近一次未超支'); }
  else if (review?.overBudget) { score += 3; reasons.improve.push('可优化消费占比偏高'); }
  else reasons.improve.push('消费结构数据不足');

  const status = score >= 80 ? '财务习惯稳健' : score >= 60 ? '正在变稳' : score >= 40 ? '需要关注' : '需要改善';
  return { score: Math.min(100, score), status, reasons };
}

/* ════════════════════════════════════════════════════════════════
   CHAT OVERLAY  — 原版视觉 + 真实 API
   ════════════════════════════════════════════════════════════════ */
function ChatOverlay({open,onClose,accent,accentInk,avatarVariant}){
  const INIT=[{id:'init',role:'assistant',text:'嗨，我是招小财，你的理财搭子。不说教，不责备，只帮你把账算清楚。\n\n你可以跟我说：\n· 我想攒钱，帮我做计划\n· 今天花了多少，帮我复盘\n· 还剩X元要撑Y天，急救一下\n· 想买个东西，帮我想想值不值\n\n先说哪个？'}];
  const [msgs,setMsgs]=useState(INIT);
  const [input,setInput]=useState('');
  const [typing,setTyping]=useState(false);
  const bottomRef=useRef(null);
  const plan=getLS('mb_plan');

  useEffect(()=>{
    if(open)setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),100);
  },[msgs,open,typing]);

  async function send(text){
    const t=(text??input).trim(); if(!t)return;
    setInput('');
    setMsgs(m=>[...m,{id:Date.now()+'u',role:'user',text:t}]);
    setTyping(true);
    try{
      const convoMsgs=msgs.filter(m=>m.role==='user'||m.role==='assistant');
      const history=convoMsgs.slice(-10).map(m=>({role:m.role,text:m.text}));
      const data=await apiPost('/api/chat',{message:t,profile:plan,history});
      setTyping(false);

      // 映射卡片
      let card=null;
      if(data.card){
        const c=data.card;
        if(c.type==='expense_review_card'&&c.total!=null){
          const z=c.zone;
          const zoneBadge=z?.zone==='green'?'绿色区✓':z?.zone==='yellow'?'黄色区':z?.zone==='red'?'红色区!':(c.overBudget?`超¥${c.overAmount}`:'未超支');
          const repairSub=c.repair?`修复：平摊${c.repair.remainingDays}天，每天少花¥${c.repair.dailyAdjustment}`:`必要¥${(c.catTotals||{}).necessary||0} 可优化¥${(c.catTotals||{}).optimizable||0}`;
          card={label:'今日支出',value:String(c.total),unit:'元',badge:zoneBadge,badgeColor:z?.color||(c.overBudget?'#ff7043':accent),
            sub:repairSub,extra:{zone:z,repair:c.repair}};
        }
        else if(c.type==='saving_plan_card')
          card={label:'每日预算',value:String(c.dailyBudget),unit:'元/天',badge:c.feasibility,sub:`每周¥${c.weeklyBudget}`};
        else if(c.type==='risk_education_card')
          card={label:'风险等级',value:c.riskLevel,unit:`${c.riskScore}/5`,badge:c.studentSuitability,sub:'不构成投资建议'};
        else if(c.type==='spending_analysis_card')
          card={type:'analysis',label:`过去${c.period?.days||14}天复盘`,value:`¥${c.totalSpent}`,unit:'总消费',badge:`日均¥${c.dailyAvg}`,
            sub:`必要${c.catPct?.necessary||0}% · 可优化${c.catPct?.optimizable||0}% · 冲动${c.catPct?.impulsive||0}%`,
            extra:{catTotals:c.catTotals,catPct:c.catPct,topItems:c.topItems,daysOver:c.daysOver,insights:c.insights||[],nextAction:c.nextAction}};
        else if(c.type==='rescue_mode_card')
          card={type:'rescue',label:'月末急救',value:String(c.dailySurvival),unit:'元/天上限',badge:c.riskLevel,
            extra:{remaining:c.remaining,days:c.days,stopItems:c.stopItems,todayAction:c.todayAction,foodBudget:c.foodBudget,riskColor:c.riskColor}};
        else if(c.type==='what_if_card')
          card={type:'whatif',label:'预算推演',value:`¥${c.monthlyChange}`,unit:'月节省',badge:`目标${c.goalImpact}%`,
            extra:{itemName:c.itemName,goalImpact:c.goalImpact,savingGoal:c.savingGoal,changeDirection:c.changeDirection,freqLabel:c.freqLabel,frequency:c.frequency,insight:c.insight}};
        else if(c.type==='impulse_check_card')
          card={type:'impulse',label:'冲动消费检测',value:`¥${c.price}`,unit:c.itemName,
            badge:c.recommendation==='safe'?'问题不大':c.recommendation==='cooldown'?'冷静24小时':'列入计划',
            extra:{equivDays:c.equivDays,goalImpact:c.goalImpact,affectsGoal:c.affectsGoal,recommendation:c.recommendation,cooldownHours:c.cooldownHours,alternativeAction:c.alternativeAction}};
        else if(c.type==='checkin_card')
          card={type:'checkin',label:'今日打卡',value:'✓',unit:'完成',badge:'坚持就是赢',badgeColor:'#16b86c',
            sub:c.date,extra:{message:c.message,date:c.date}};
        else if(c.type==='alternative_card')
          card={type:'alternative',label:`${c.item}替代方案`,value:`¥${c.monthlySpend}`,unit:'月消费',badge:'4种方案',
            extra:{item:c.item,alternatives:c.alternatives,savingGoal:c.savingGoal}};
        else if(c.type==='investment_readiness_card')
          card={type:'invest',label:'投资准备度',value:c.stage,unit:'',badge:c.readiness==='not_ready'?'暂不建议投入':c.readiness==='marginal'?'谨慎观望':'可以学习入门',
            badgeColor:c.readinessColor,
            extra:{readiness:c.readiness,remainingBalance:c.remainingBalance,daysToMonthEnd:c.daysToMonthEnd,dailyAvg:c.dailyAvg,projectedNeed:c.projectedNeed,shortfall:c.shortfall,cashFlowTight:c.cashFlowTight,hasEmergencyFund:c.hasEmergencyFund,investAmount:c.investAmount,nextSteps:c.nextSteps,disclaimer:c.disclaimer}};
      }

      // emotion 卡（情绪场景）
      const emotionBubble = data.emotion?.type==='comforting'||data.emotion?.type==='encouraging'
        ? data.emotion.text : null;

      // 数据同步：Agent 修改了 DB → 通知首页刷新
      if(data.dataUpdated){
        window.dispatchEvent(new CustomEvent('mb-data-updated'));
        // 更新本地 localStorage 里的 plan，以便其他页面知道数据变了
        const plan=getLS('mb_plan');
        if(plan&&data.card?.type==='saving_plan_card'){
          setLS('mb_plan',{...plan,dailyBudget:data.card.dailyBudget,weeklyBudget:data.card.weeklyBudget,savingGoal:data.card.savingGoal??plan.savingGoal});
        }
      }

      const syncNote=data.syncNote||null;
      const newMsg = {id:Date.now()+'a',role:'assistant',text:data.reply,card,emotionBubble,syncNote};
      const suggestions = data.nextSuggestions||[];
      setMsgs(m=>[...m,newMsg,...(suggestions.length?[{id:Date.now()+'s',role:'suggestions',items:suggestions}]:[])]);
    }catch{
      setTyping(false);
      setMsgs(m=>[...m,{id:Date.now()+'a',role:'assistant',text:'网络好像出了点问题，稍后再试？'}]);
    }
  }

  return(
    <>
      <div onClick={onClose} style={{
        position:'absolute',inset:0,zIndex:40,
        background:'rgba(10,10,12,0.18)',
        backdropFilter:'blur(2px)',WebkitBackdropFilter:'blur(2px)',
        opacity:open?1:0,pointerEvents:open?'auto':'none',transition:'opacity .25s ease',
      }}/>
      <div style={{
        position:'absolute',left:10,right:10,bottom:96,
        height:'75%',zIndex:50,borderRadius:32,
        background:'rgba(255,255,255,0.62)',
        backdropFilter:'blur(40px) saturate(200%)',WebkitBackdropFilter:'blur(40px) saturate(200%)',
        border:'0.5px solid rgba(255,255,255,0.8)',
        boxShadow:'inset 0 1px 0 rgba(255,255,255,0.9),0 -8px 40px rgba(0,0,0,0.18)',
        transform:open?'translateY(0) scale(1)':'translateY(40px) scale(0.96)',
        opacity:open?1:0,pointerEvents:open?'auto':'none',
        transition:'transform .35s cubic-bezier(.2,.85,.3,1),opacity .25s ease',
        display:'flex',flexDirection:'column',overflow:'hidden',
      }}>
        {/* HEADER */}
        <div style={{padding:'14px 18px 10px',display:'flex',alignItems:'center',gap:10,borderBottom:'0.5px solid rgba(0,0,0,0.06)',position:'relative',background:'rgba(255,255,255,0.30)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)'}}>
          <div style={{position:'absolute',top:7,left:'50%',transform:'translateX(-50%)',width:38,height:4,borderRadius:999,background:'rgba(0,0,0,0.18)'}}/>
          <Buddy size={32} variant={avatarVariant} accent={accent}/>
          <div style={{flex:1,marginTop:4}}>
            <div style={{fontSize:14,fontWeight:800,color:'#0a0a0a'}}>招小财</div>
            <div style={{display:'flex',alignItems:'center',gap:5}}>
              <span style={{width:5,height:5,borderRadius:999,background:'#16b86c'}}/>
              <span style={{fontSize:10.5,color:'#9a9a96',fontWeight:600}}>ONLINE</span>
            </div>
          </div>
          <button onClick={onClose} className="press" style={{width:36,height:36,borderRadius:18,border:0,background:'rgba(255,255,255,0.60)',backdropFilter:'blur(28px) saturate(180%)',WebkitBackdropFilter:'blur(28px) saturate(180%)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
            <Icon.Plus size={18} color="#0a0a0a" style={{transform:'rotate(45deg)'}}/>
          </button>
        </div>

        {/* MESSAGES */}
        <div className="app-scroll" style={{flex:1,overflowY:'auto',padding:'14px 16px 8px'}}>
          {msgs.map(m=>{
            // suggestions 行
            if(m.role==='suggestions') return(
              <div key={m.id} style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12,paddingLeft:36}}>
                {m.items.map(s=>(
                  <button key={s} onClick={()=>send(s)} style={{
                    fontSize:11.5,fontWeight:600,padding:'6px 12px',borderRadius:999,cursor:'pointer',
                    background:'rgba(255,255,255,0.65)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',
                    border:'0.5px solid rgba(0,0,0,0.06)',color:'#3a3a38',whiteSpace:'nowrap',
                  }}>{s}</button>
                ))}
              </div>
            );

            return(
            <div key={m.id} style={{marginBottom:10}}>
              {/* emotion bubble（情绪陪伴时显示）*/}
              {m.emotionBubble&&(
                <div style={{
                  marginBottom:6,marginLeft:36,
                  display:'inline-block',padding:'6px 12px',borderRadius:14,
                  background:`${accent}22`,
                  border:`1px solid ${accent}44`,
                  fontSize:12,fontWeight:600,color:'#0a0a0a',
                }}>{m.emotionBubble}</div>
              )}
              <div style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start',alignItems:'flex-end',gap:8}}>
                {m.role==='assistant'&&<Buddy size={28} variant={avatarVariant} accent={accent}/>}
                <div style={{
                  maxWidth:'78%',padding:'10px 14px',fontSize:13.5,lineHeight:1.55,
                  background:m.role==='user'?'rgba(10,10,14,0.90)':'rgba(255,255,255,0.72)',
                  backdropFilter:'blur(24px) saturate(180%)',WebkitBackdropFilter:'blur(24px) saturate(180%)',
                  color:m.role==='user'?'#fff':'#0a0a0a',
                  border:m.role==='user'?'0.5px solid rgba(255,255,255,0.12)':'0.5px solid rgba(255,255,255,0.9)',
                  boxShadow:m.role==='user'?'inset 0 1px 0 rgba(255,255,255,0.10),0 4px 14px rgba(0,0,0,0.18)':'0 1px 3px rgba(0,0,0,0.05)',
                  borderRadius:m.role==='user'?'20px 20px 6px 20px':'20px 20px 20px 6px',
                  whiteSpace:'pre-wrap',
                }}>
                  {m.text}
                  {/* 数据同步提示 */}
                  {m.syncNote&&(
                    <div style={{marginTop:6,display:'inline-flex',alignItems:'center',gap:4,
                      padding:'3px 8px',borderRadius:999,
                      background:'rgba(22,184,108,0.12)',border:'0.5px solid rgba(22,184,108,0.3)'}}>
                      <span style={{fontSize:8,color:'#16b86c',fontWeight:800}}>✓</span>
                      <span style={{fontSize:9.5,color:'#16b86c',fontWeight:700}}>{m.syncNote}</span>
                    </div>
                  )}
                  {m.card&&(
                    <div style={{marginTop:8,padding:'10px 12px',borderRadius:14,background:'rgba(255,255,255,0.45)',backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',border:'0.5px solid rgba(255,255,255,0.80)'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
                        <span style={{fontSize:10,fontWeight:800,color:'#9a9a96',letterSpacing:'0.12em'}}>{m.card.label}</span>
                        {m.card.badge&&<span style={{
                          fontSize:10,fontWeight:800,padding:'2px 7px',borderRadius:999,
                          background:m.card.badgeColor||(m.card.type==='rescue'?(m.card.extra?.riskColor==='critical'?'#e53935':m.card.extra?.riskColor==='tight'?'#ff7043':accent):accent),
                          color:'#0a0a0a',
                        }}>{m.card.badge}</span>}
                      </div>
                      <div style={{display:'flex',alignItems:'flex-end',gap:4,marginTop:4}}>
                        <span className="num" style={{fontSize:26,fontWeight:900,color:'#0a0a0a'}}>{m.card.value}</span>
                        <span style={{fontSize:12,color:'#9a9a96',fontWeight:600,marginBottom:2}}>{m.card.unit}</span>
                      </div>
                      {m.card.sub&&<div style={{fontSize:10.5,color:'#9a9a96',marginTop:2}}>{m.card.sub}</div>}

                      {/* 月末急救卡 */}
                      {m.card.type==='rescue'&&m.card.extra&&(()=>{
                        const e=m.card.extra;
                        return(<>
                          <div style={{marginTop:8,display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                            <div style={{padding:'6px 8px',borderRadius:8,background:'rgba(0,0,0,0.05)'}}>
                              <div style={{fontSize:9,color:'#9a9a96',fontWeight:700}}>剩余金额</div>
                              <div className="num" style={{fontSize:16,fontWeight:900}}>¥{e.remaining}</div>
                            </div>
                            <div style={{padding:'6px 8px',borderRadius:8,background:'rgba(0,0,0,0.05)'}}>
                              <div style={{fontSize:9,color:'#9a9a96',fontWeight:700}}>剩余天数</div>
                              <div className="num" style={{fontSize:16,fontWeight:900}}>{e.days} 天</div>
                            </div>
                          </div>
                          {e.stopItems?.length>0&&<div style={{marginTop:6,fontSize:9.5,color:'#9a9a96'}}>暂停：{e.stopItems.join('、')}</div>}
                          {e.todayAction&&<div style={{marginTop:6,padding:'5px 8px',borderRadius:8,background:'rgba(229,57,53,0.10)',border:'0.5px solid rgba(229,57,53,0.25)',fontSize:10,fontWeight:700,color:'#c62828'}}>今日行动：{e.todayAction}</div>}
                        </>);
                      })()}

                      {/* What-if 推演卡 */}
                      {m.card.type==='whatif'&&m.card.extra&&(()=>{
                        const e=m.card.extra;
                        const barW=Math.min(100,e.goalImpact||0);
                        return(<>
                          <div style={{marginTop:8}}>
                            <div style={{fontSize:9,color:'#9a9a96',fontWeight:700,marginBottom:4}}>目标贡献度 {e.goalImpact}%</div>
                            <div style={{height:6,borderRadius:999,background:'rgba(0,0,0,0.08)',overflow:'hidden'}}>
                              <div style={{height:'100%',width:`${barW}%`,background:accent,borderRadius:999,transition:'width .6s ease'}}/>
                            </div>
                          </div>
                          {e.itemName&&e.itemName!=='该消费'&&<div style={{marginTop:5,fontSize:9.5,color:'#9a9a96'}}>涉及：{e.itemName} · 目标 ¥{e.savingGoal}</div>}
                          {e.insight&&<div style={{marginTop:6,padding:'5px 8px',borderRadius:8,background:`${accent}22`,fontSize:10,fontWeight:700,color:'#0a0a0a'}}>{e.insight}</div>}
                        </>);
                      })()}

                      {/* 冲动消费检测卡 */}
                      {m.card.type==='impulse'&&m.card.extra&&(()=>{
                        const e=m.card.extra;
                        const recColors={safe:'rgba(22,184,108,0.15)',cooldown:'rgba(255,112,67,0.15)',plan:`${accent}22`};
                        const recText={safe:'可以考虑购买',cooldown:`冷静 ${e.cooldownHours}h 再决定`,plan:'列入下月计划'};
                        return(<>
                          {e.equivDays&&<div style={{marginTop:6,fontSize:9.5,color:'#9a9a96'}}>约等于 {e.equivDays} 天日预算 · 影响目标 {e.goalImpact}%</div>}
                          <div style={{marginTop:6,padding:'5px 8px',borderRadius:8,background:recColors[e.recommendation]||`${accent}22`,fontSize:10,fontWeight:700,color:'#0a0a0a'}}>
                            {recText[e.recommendation]||'建议思考后决定'}
                          </div>
                          {e.alternativeAction&&<div style={{marginTop:4,fontSize:9.5,color:'#9a9a96'}}>{e.alternativeAction}</div>}
                        </>);
                      })()}

                      {/* spending_analysis 扩展分类条 */}
                      {m.card.type==='analysis'&&m.card.extra&&(()=>{
                        const e=m.card.extra;
                        const CATS=[
                          {k:'necessary',   l:'必要',   c:'rgba(255,255,255,0.92)'},
                          {k:'optimizable', l:'可优化', c:'rgba(200,255,58,0.85)'},
                          {k:'impulsive',   l:'冲动',   c:accent},
                          {k:'learning',    l:'学习',   c:'rgba(0,0,0,0.35)'},
                        ];
                        const total=Object.values(e.catTotals||{}).reduce((s,v)=>s+v,0)||1;
                        return(<>
                          <div style={{height:6,background:'rgba(0,0,0,0.06)',borderRadius:999,marginTop:10,display:'flex',overflow:'hidden',gap:1}}>
                            {CATS.map(ct=><div key={ct.k} style={{width:`${(e.catTotals?.[ct.k]||0)/total*100}%`,background:ct.c}}/>)}
                          </div>
                          <div style={{display:'flex',justifyContent:'space-between',marginTop:5}}>
                            {CATS.map(ct=>(
                              <div key={ct.k} style={{display:'flex',alignItems:'center',gap:3}}>
                                <span style={{width:5,height:5,borderRadius:999,background:ct.c,flexShrink:0}}/>
                                <span style={{fontSize:9,color:'#9a9a96',fontWeight:600}}>{ct.l} ¥{e.catTotals?.[ct.k]||0}</span>
                              </div>
                            ))}
                          </div>
                          {e.topItems?.length>0&&<div style={{marginTop:6,fontSize:9.5,color:'#9a9a96'}}>主要漏洞：{e.topItems.join(' · ')}</div>}
                          {e.nextAction&&<div style={{marginTop:6,padding:'5px 8px',borderRadius:8,background:`${accent}22`,fontSize:10,fontWeight:700,color:'#0a0a0a'}}>💡 {e.nextAction}</div>}
                        </>);
                      })()}

                      {/* 打卡卡 */}
                      {m.card.type==='checkin'&&m.card.extra&&(()=>{
                        const e=m.card.extra;
                        return(
                          <div style={{marginTop:8,padding:'8px 10px',borderRadius:10,background:'rgba(22,184,108,0.12)',border:'0.5px solid rgba(22,184,108,0.30)',textAlign:'center'}}>
                            <div style={{fontSize:20,marginBottom:4}}>🎯</div>
                            <div style={{fontSize:11,fontWeight:800,color:'#16b86c'}}>{e.message||'今日目标完成！'}</div>
                            <div style={{fontSize:9.5,color:'#9a9a96',marginTop:2}}>{e.date}</div>
                          </div>
                        );
                      })()}

                      {/* 消费替代方案卡 */}
                      {m.card.type==='alternative'&&m.card.extra&&(()=>{
                        const e=m.card.extra;
                        const pc={'极低':'rgba(22,184,108,0.12)','低':'rgba(200,255,58,0.12)','中':'rgba(255,152,0,0.12)','高':'rgba(229,57,53,0.08)'};
                        return(
                          <div style={{marginTop:8}}>
                            {(e.alternatives||[]).map(a=>(
                              <div key={a.plan} style={{marginBottom:5,padding:'6px 8px',borderRadius:8,background:pc[a.pressure]||'rgba(0,0,0,0.04)',border:'0.5px solid rgba(0,0,0,0.06)'}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                  <span style={{fontSize:10,fontWeight:800,color:'#0a0a0a'}}>方案{a.plan}·{a.label}</span>
                                  <span style={{fontSize:9,color:'#9a9a96',fontWeight:600}}>压力:{a.pressure}</span>
                                </div>
                                <div style={{fontSize:9.5,color:'#3a3a38',marginTop:2}}>{a.desc}</div>
                                <div style={{fontSize:10,fontWeight:800,color:'#16b86c',marginTop:2}}>月省 ¥{a.monthlySaving}</div>
                              </div>
                            ))}
                          </div>
                        );
                      })()}
                      {m.card.type==='invest'&&m.card.extra&&(()=>{
                        const e=m.card.extra;
                        const readinessColor=e.readiness==='not_ready'?'#ff7043':e.readiness==='marginal'?'#ffd54f':'#c8ff3a';
                        const readinessLabel=e.readiness==='not_ready'?'暂不建议':e.readiness==='marginal'?'谨慎观望':'可以学习';
                        return(
                          <div style={{marginTop:8}}>
                            {/* 现金流状态行 */}
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:5,marginBottom:8}}>
                              {[
                                {label:'当前余额',val:`¥${e.remainingBalance}`,color:'#f8f8f6'},
                                {label:`还剩${e.daysToMonthEnd}天`,val:`预计¥${e.projectedNeed}`,color:e.cashFlowTight?'rgba(255,112,67,0.1)':'rgba(22,184,108,0.1)'},
                                {label:'日均消费',val:`¥${e.dailyAvg}/天`,color:'#f8f8f6'},
                              ].map(item=>(
                                <div key={item.label} style={{background:item.color,borderRadius:6,padding:'5px 6px',textAlign:'center'}}>
                                  <div style={{fontSize:9,color:'#8a8a86',marginBottom:2}}>{item.label}</div>
                                  <div style={{fontSize:10.5,fontWeight:800,color:'#0a0a0a'}}>{item.val}</div>
                                </div>
                              ))}
                            </div>
                            {/* 状态标签 */}
                            <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
                              <span style={{fontSize:9.5,padding:'2px 7px',borderRadius:99,background:`${readinessColor}22`,color:readinessColor,fontWeight:700,border:`1px solid ${readinessColor}44`}}>{readinessLabel}</span>
                              <span style={{fontSize:9.5,padding:'2px 7px',borderRadius:99,background:'rgba(0,0,0,0.04)',color:'#6a6a66',fontWeight:600}}>{e.hasEmergencyFund?'✓ 有应急金':'✗ 应急金不足'}</span>
                              {e.cashFlowTight&&<span style={{fontSize:9.5,padding:'2px 7px',borderRadius:99,background:'rgba(255,112,67,0.1)',color:'#ff7043',fontWeight:600}}>⚠ 现金流偏紧</span>}
                            </div>
                            {/* 行动建议 */}
                            {(e.nextSteps||[]).map((s,i)=>(
                              <div key={i} style={{display:'flex',gap:7,alignItems:'flex-start',marginBottom:4}}>
                                <span style={{minWidth:16,height:16,borderRadius:99,background:'rgba(200,255,58,0.15)',border:'1px solid rgba(200,255,58,0.4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8.5,fontWeight:800,color:'#6a8a00',flexShrink:0,marginTop:1}}>{i+1}</span>
                                <span style={{fontSize:9.5,color:'#3a3a38',lineHeight:1.4}}>{s}</span>
                              </div>
                            ))}
                            {/* 免责声明 */}
                            {e.disclaimer&&<div style={{marginTop:8,fontSize:8.5,color:'#9a9a96',borderTop:'0.5px solid rgba(0,0,0,0.06)',paddingTop:6,lineHeight:1.4}}>{e.disclaimer}</div>}
                          </div>
                        );
                      })()}
                    </div>
                  )}
                </div>
              </div>
            </div>
            );
          })}
          {typing&&(
            <div style={{display:'flex',alignItems:'flex-end',gap:8,marginBottom:10}}>
              <Buddy size={28} variant={avatarVariant} accent={accent}/>
              <div style={{padding:'12px 16px',borderRadius:'20px 20px 20px 6px',background:'rgba(255,255,255,0.72)',backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)',border:'0.5px solid rgba(255,255,255,0.88)',display:'flex',gap:4,alignItems:'center'}}>
                {[0,1,2].map(i=><span key={i} style={{width:5,height:5,borderRadius:999,background:'#9a9a96',animation:`mb-bounce 1.2s ${i*150}ms infinite ease-in-out`}}/>)}
              </div>
            </div>
          )}
          <div ref={bottomRef}/>
        </div>

        {/* CHIPS */}
        {msgs.length<=2&&(
          <div>
            <div style={{display:'flex',gap:6,overflowX:'auto',padding:'0 16px 6px'}}>
              {[
                {label:'攒钱计划',msg:'我想攒钱，帮我制定计划'},
                {label:'消费复盘',msg:'帮我复盘今天消费'},
                {label:'月末急救',msg:'我还剩180元，要撑7天，怎么办'},
                {label:'What-if推演',msg:'如果我每周少喝3杯奶茶能省多少'},
                {label:'风险守门',msg:'基金会亏吗'},
              ].map(c=>(
                <button key={c.label} onClick={()=>send(c.msg)} className="press" style={{flexShrink:0,fontSize:12,fontWeight:600,padding:'7px 12px',borderRadius:999,cursor:'pointer',background:'rgba(255,255,255,0.60)',backdropFilter:'blur(28px) saturate(180%)',WebkitBackdropFilter:'blur(28px) saturate(180%)',color:'#3a3a38',whiteSpace:'nowrap',border:'0.5px solid rgba(0,0,0,0.06)'}}>{c.label}</button>
              ))}
            </div>
            <div style={{padding:'0 16px 4px',fontSize:10,color:'#b0b0ac',fontWeight:600}}>
              WarmPlan · GentleReview · RescueMode · What-if · RiskGuard
            </div>
          </div>
        )}

        {/* INPUT */}
        <div style={{padding:'8px 12px 14px',display:'flex',gap:8,alignItems:'center',background:'rgba(255,255,255,0.30)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)'}}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}
            placeholder="有什么想问的…"
            style={{flex:1,fontSize:14,padding:'12px 16px',borderRadius:22,
              background:'rgba(255,255,255,0.60)',backdropFilter:'blur(28px) saturate(180%)',WebkitBackdropFilter:'blur(28px) saturate(180%)',border:'0.5px solid rgba(0,0,0,0.06)',
              outline:'none',color:'#0a0a0a',boxShadow:'inset 0 1px 0 rgba(255,255,255,0.9)'}}/>
          <button onClick={()=>send()} disabled={!input.trim()} className="press" style={{
            width:44,height:44,borderRadius:22,border:0,cursor:'pointer',
            background:input.trim()?accent:'#c8c8c4',color:'#fff',
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:'inset 0 1px 0 rgba(255,255,255,0.22),0 4px 14px rgba(0,0,0,0.18)',
          }}>
            <Icon.Send size={18} color="#fff"/>
          </button>
        </div>
      </div>
    </>
  );
}

/* ════════════════════════════════════════════════════════════════
   APP ROOT
   ════════════════════════════════════════════════════════════════ */
const ACCENT='#c8ff3a';
const ACCENT_INK=inkOn(ACCENT);

function App(){
  const [screen,setScreen]=useState('home');
  const [chatOpen,setChatOpen]=useState(false);

  useEffect(()=>{
    const m=/^#?([a-f0-9]{6})$/i.exec(ACCENT);
    if(m){
      const n=parseInt(m[1],16);
      const r=(n>>16)&255,g=(n>>8)&255,b=n&255;
      document.documentElement.style.setProperty('--accent',ACCENT);
      document.documentElement.style.setProperty('--accent-ink',ACCENT_INK);
      document.documentElement.style.setProperty('--accent-glow',`rgba(${r},${g},${b},0.22)`);
    }
  },[]);

  function nav(id){
    if(id==='chat'){setChatOpen(o=>!o);return;}
    setChatOpen(false);setScreen(id);
  }

  const props={onNav:nav,accent:ACCENT,accentInk:ACCENT_INK,navStyle:'fab',chatOpen};

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',position:'relative',overflow:'hidden',maxWidth:430,margin:'0 auto',background:'var(--bg-0)'}}>
      <div className="top-safe"/>
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        {screen==='home'   && <HomeScreen    {...props}/>}
        {screen==='plan'   && <PlanScreen    {...props}/>}
        {screen==='review' && <ReviewScreen  {...props}/>}
        {screen==='risk'   && <RiskScreen    {...props}/>}
        {screen==='me'     && <ProfileScreen {...props}/>}
        <ChatOverlay open={chatOpen} onClose={()=>setChatOpen(false)} accent={ACCENT} accentInk={ACCENT_INK}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
